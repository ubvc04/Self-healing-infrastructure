apiVersion: apps/v1
kind: Deployment
metadata:
  name: self-healer-controller-manager
  namespace: self-healer-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: self-healer-controller-manager
  template:
    metadata:
      labels:
        app: self-healer-controller-manager
    spec:
      serviceAccountName: self-healer-controller-manager
      containers:
      - name: manager
        image: ghcr.io/ubvc04/self-healer-operator:699b264aa6184703506b8e55beb1ff5ed129d704
        command:
        - /manager
        args:
        - --leader-elect=true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
