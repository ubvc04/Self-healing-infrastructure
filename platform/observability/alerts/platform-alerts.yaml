apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: platform-alerts
  namespace: observability
spec:
  groups:
  - name: platform-critical
    rules:
    - alert: HighCPUUsage
      expr: sum(rate(container_cpu_usage_seconds_total{namespace="apps", container!=""}[5m])) by (pod) > 0.8
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "High CPU usage detected"
        description: "Pod {{ $labels.pod }} in apps namespace has sustained CPU usage above threshold"
    - alert: PodCrashLooping
      expr: increase(kube_pod_container_status_restarts_total{namespace="apps"}[10m]) > 3
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "Pod restarting repeatedly"
        description: "Container in pod {{ $labels.pod }} restarted more than 3 times in 10 minutes"
    - alert: HighP95Latency
      expr: histogram_quantile(0.95, sum(rate(api_request_latency_seconds_bucket[5m])) by (le, endpoint)) > 0.5
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High API latency"
        description: "95th percentile latency over 500ms for endpoint {{ $labels.endpoint }}"
