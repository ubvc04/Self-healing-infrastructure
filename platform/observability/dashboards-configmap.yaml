apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-platform-api
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  platform-api-dashboard.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "panels": [
        {
          "type": "timeseries",
          "title": "API Request Rate",
          "targets": [{"expr": "sum(rate(api_requests_total[1m]))", "refId": "A"}],
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0}
        },
        {
          "type": "timeseries",
          "title": "P95 Latency",
          "targets": [{"expr": "histogram_quantile(0.95, sum(rate(api_request_latency_seconds_bucket[5m])) by (le))", "refId": "A"}],
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0}
        },
        {
          "type": "timeseries",
          "title": "Worker Replica Count",
          "targets": [{"expr": "kube_deployment_status_replicas{namespace=\\"apps\\",deployment=\\"queue-worker\\"}", "refId": "A"}],
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 8}
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["platform", "apps"],
      "templating": {"list": []},
      "time": {"from": "now-30m", "to": "now"},
      "timezone": "browser",
      "title": "Platform API Overview",
      "version": 1
    }
