apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: self-healer-operator
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://github.com/YOUR_ORG/YOUR_REPO.git
    targetRevision: main
    path: operator/self-healer/config
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: self-healer-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
