apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keda
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://kedacore.github.io/charts
    chart: keda
    targetRevision: 2.15.1
    helm:
      releaseName: keda
      values: |
        crds:
          install: true
  destination:
    server: https://kubernetes.default.svc
    namespace: keda
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
