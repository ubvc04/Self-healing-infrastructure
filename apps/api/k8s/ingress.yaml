apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-api
  namespace: apps
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: api.platform.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: platform-api
            port:
              number: 80
