apiVersion: apps/v1
kind: Deployment
metadata:
  name: queue-worker
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: queue-worker
  template:
    metadata:
      labels:
        app: queue-worker
    spec:
      containers:
      - name: worker
        image: ghcr.io/YOUR_ORG/queue-worker:latest
        env:
        - name: RABBITMQ_HOST
          value: rabbitmq.apps.svc.cluster.local
        - name: RABBITMQ_QUEUE
          value: jobs
        - name: RABBITMQ_USERNAME
          valueFrom:
            secretKeyRef:
              name: rabbitmq-auth
              key: username
        - name: RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: rabbitmq-auth
              key: password
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
