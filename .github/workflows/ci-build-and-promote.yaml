name: ci-build-and-promote

on:
  push:
    branches: [main]
    paths:
    - apps/api/**
    - apps/worker/**
    - operator/self-healer/**
    - .github/workflows/ci-build-and-promote.yaml

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push API image
      uses: docker/build-push-action@v6
      with:
        context: ./apps/api
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/platform-api:${{ github.sha }}

    - name: Build and push Worker image
      uses: docker/build-push-action@v6
      with:
        context: ./apps/worker
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/queue-worker:${{ github.sha }}

    - name: Build and push self-healer operator image
      uses: docker/build-push-action@v6
      with:
        context: ./operator/self-healer
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/self-healer-operator:${{ github.sha }}

    - name: Update Kubernetes manifests with new tag
      run: |
        sed -Ei "s|image: .*/platform-api:.*|image: ghcr.io/${{ github.repository_owner }}/platform-api:${{ github.sha }}|g" apps/api/k8s/deployment.yaml
        sed -Ei "s|image: .*/queue-worker:.*|image: ghcr.io/${{ github.repository_owner }}/queue-worker:${{ github.sha }}|g" apps/worker/k8s/deployment.yaml
        sed -Ei "s|image: .*/self-healer-operator:.*|image: ghcr.io/${{ github.repository_owner }}/self-healer-operator:${{ github.sha }}|g" operator/self-healer/config/manager/manager.yaml

    - name: Commit image tag updates
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add apps/api/k8s/deployment.yaml apps/worker/k8s/deployment.yaml operator/self-healer/config/manager/manager.yaml
        git diff --staged --quiet || git commit -m "chore: promote images to ${{ github.sha }}"
        git push
